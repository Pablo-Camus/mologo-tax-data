name: Auto-update tax rates
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic
      - name: Check and update rates
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python3 scripts/update_rates.py
      - name: Commit if changed
        run: |
          git config user.name  "Mologo Tax Bot"
          git config user.email "bot@mologo.app"
          git add tax-data.json
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "Auto-update tax rates $(date +%Y-%m-%d)"
            git push
          )
